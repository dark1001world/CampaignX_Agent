<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampaignX AI Marketing</title>
    <meta name="description" content="AI Multi-Agent System for Marketing Campaign Automation">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="glass-panel">
            <div class="brand">
                <div class="logo"></div>
                <h1>CampaignX <span>Agent</span></h1>
            </div>
            <div class="metrics">
                <div class="metric">
                    <span class="label">Avg Open Rate</span>
                    <span class="value" id="openRate">--%</span>
                </div>
                <div class="metric">
                    <span class="label">Avg Click Rate</span>
                    <span class="value" id="clickRate">--%</span>
                </div>
            </div>
        </header>

        <main class="dashboard">
            <section class="panel input-panel glass-panel">
                <h2>Campaign Brief</h2>
                <p class="subtitle">Enter natural language instructions for the SuperBFSI marketing campaign.</p>
                <textarea id="briefInput" placeholder="e.g., Run an email campaign for launching XDeposit, targeting female senior citizens. Optimize for open rate..."></textarea>
                <button id="generateBtn" class="primary-btn">
                    <span class="btn-text">Generate Strategy & Content</span>
                    <div class="loader" id="generateLoader"></div>
                </button>
            </section>

            <section class="panel approval-panel glass-panel">
                <h2>Human-in-Loop Approvals</h2>
                <div id="approvalsQueue" class="queue-container">
                    <div class="empty-state">
                        <p>No campaigns awaiting approval.</p>
                    </div>
                </div>
            </section>
            
            <section class="panel logs-panel glass-panel">
                <h2>Agent Interaction Logs</h2>
                <div id="agentLogs" class="logs-container">
                    <div class="log-entry system">System initialized. Awaiting input.</div>
                </div>
            </section>
        </main>
    </div>
    
    <!-- Secrets -->
    <script>
        const GEMINI_API_KEY = "AIzaSyAt_8AiNsKu7YMW7Y2_lzPJQokgKm34Iyk";
    </script>
    <script src="app.js"></script>
</body>
</html>
